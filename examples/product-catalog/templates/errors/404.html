<!doctype html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 Not Found - Facet Product Catalog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
    <main class="container">
        <article style="max-width: 600px; margin: 4rem auto; text-align: center;">
            <header>
                <h1>404</h1>
                <p>The page you are looking for could not be found.</p>
            </header>

            <section>
                <p>The resource at <code>{{ path }}</code> does not exist or has been moved.</p>
            </section>

            <footer>
                <a href="/shop/products" role="button">Browse Products</a>
                <a href="javascript:history.back()" role="button" class="secondary">Go Back</a>
            </footer>
        </article>
    </main>
</body>
</html>
